<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김보화 자기소개</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    .video-box {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    video {
      width: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>김보화 자기소개</h1>

    <div class="video-box">
      <video controls autoplay muted loop>
        <source src="video-intro.mp4" type="video/mp4" />
      </video>
      <strong>🔊 소리를 켜고 시청해주세요. </strong>
    </div>
  </div>
</body>
</html>
